<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Auktion</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR (optional falls du sie auch hier nutzt) -->
<nav class="navbar">
  <div class="navbar-container">
    <a href="index.html" class="nav-logo">Dashboard</a>
    <a href="roster.html" class="nav-link">Roster</a>
    <a href="players.html" class="nav-link">Spielerliste</a>

    <div class="dropdown">
      <button class="dropbtn">League ▾</button>
      <div class="dropdown-content">
        <a href="transactions.html">Transactions</a>
        <a href="statpage.html">Fantasy Stats</a>
        <a href="records.html">League Records</a>
        <a href="hof.html">Hall of Fame</a>

    <a href="salary.html" class="nav-link">Salary</a>

<h1>Auktion</h1>

<!-- =========================
     PLAYER LOAD SECTION
========================= -->
<div class="filter-container">

  <button id="syncBtn">Spieler laden</button>
  <span id="status"></span>

</div>

<!-- =========================
     AUCTION INPUT SECTION
========================= -->
<h2>Auktion starten</h2>

<div class="filter-container auction-controls">

  <!-- Player Input + Dropdown -->
  <div style="position: relative; flex: 2;">
    <input id="playerInput" placeholder="Spieler suchen">

    <ul id="playerDropdown" style="
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background-color: #1b2a3a;
      border: 1px solid #223348;
      border-radius: 6px;
      max-height: 220px;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
      z-index: 50;
    "></ul>
  </div>

  <input id="bidderInput" placeholder="Bieter">
  <input id="amountInput" type="number" placeholder="Gebot">

  <button id="bidBtn">Bieten</button>

</div>

<!-- =========================
     ACTIVE AUCTIONS TABLE
========================= -->
<h2>Aktive Auktionen</h2>

<table>
  <thead>
    <tr>
      <th>Spieler</th>
      <th>Position</th>
      <th>Team</th>
      <th>Gebot</th>
      <th>Bieter</th>
    </tr>
  </thead>
  <tbody id="playersTable"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>

</body>
</html>
