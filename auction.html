<!DOCTYPE html>
<html>
<head>
  <title>Auktion</title>
</head>
<body>

<h2>Spieler laden (Sleeper)</h2>
<button id="syncBtn">Spieler laden</button>
<p id="status"></p>

<hr>

<h2>Auktion</h2>

<div style="position: relative;">
  <input id="playerInput" placeholder="Spieler suchen">
  <ul id="playerDropdown" style="
    position: absolute;
    background: white;
    border: 1px solid #ccc;
    width: 250px;
    max-height: 200px;
    overflow-y: auto;
    list-style: none;
    padding: 0;
    margin: 0;
  "></ul>
</div>

<input id="bidderInput" placeholder="Dein Name">
<input id="amountInput" type="number" placeholder="Gebot">

<button id="bidBtn">Bieten</button>

<hr>

<h2>Aktive Auktionen</h2>

<table border="1">
  <thead>
    <tr>
      <th>Spieler</th>
      <th>Gebot</th>
      <th>Bieter</th>
    </tr>
  </thead>
  <tbody id="playersTable"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>

</body>
</html>
